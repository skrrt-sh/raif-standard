name: JS Release

# Release pipeline for the `raif` npm package via Changesets + npm OIDC trusted
# publishing (provenance auto-on; no long-lived NPM_TOKEN).
#
# ── ONE-TIME MANUAL SETUP (required before this workflow can publish) ──────────
#   1. Register the trusted publisher at npmjs.com for the `raif` package:
#        Package: raif
#        Repository: skrrt-sh/raif-standard
#        Workflow filename: js-release.yml
#        Environment: npm-publish
#      (npmjs.com → package settings → "Trusted Publisher" → GitHub Actions.)
#   2. Create the `npm-publish` GitHub Environment on the repo (Settings →
#      Environments) and add any desired protection rules / reviewers.
#   3. FIRST PUBLISH OF A BRAND-NEW NAME: npm cannot attach a trusted publisher
#      to a package that does not yet exist. The very first `raif@x.y.z` may need
#      a one-time manual/token publish (`npm publish --access public --provenance`
#      from a maintainer machine) to create the package; OIDC handles every
#      release after that.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "packages/js/**"
      - ".github/workflows/js-release.yml"

concurrency:
  group: js-release-${{ github.ref }}
  cancel-in-progress: false

# Default-deny at the top level; the publish job re-grants the minimum.
permissions: {}

defaults:
  run:
    working-directory: packages/js

jobs:
  release:
    name: Version PR / publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # create the Version PR / tags
      pull-requests: write # open/update the Version PR
      id-token: write # npm OIDC trusted publishing

    steps:
      - name: Harden runner
        # pin to SHA
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        # pin to SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        # pin to SHA
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13
          # Avoid action caching while id-token is in scope (OIDC exfil vector).
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Node for npm OIDC trusted publishing
        # pin to SHA
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.12.0"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Create Version PR or publish
        id: changesets
        # pin to SHA
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          cwd: packages/js
          version: bun run version:packages
          publish: bun run release
          commit: "chore(js): release raif"
          title: "chore(js): release raif"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty NPM_TOKEN defeats any fallback to a static credential, forcing
          # OIDC trusted publishing. Provenance is auto-on under OIDC.
          NPM_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"

      - name: Publish summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "## Published" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | "- \(.name)@\(.version)"' >> "$GITHUB_STEP_SUMMARY"
