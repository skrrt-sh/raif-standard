name: JS CI

# Lint, typecheck, test, build and packaging validation for the `raif` package.
# Path-filtered to packages/js so unrelated changes (e.g. the Python package)
# don't trigger this pipeline.

on:
  push:
    branches: [main]
    paths:
      - "packages/js/**"
      - "conformance/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "packages/js/**"
      - "conformance/**"
      - ".github/workflows/ci.yml"

# Default-deny at the top level. The single job re-grants only read access.
permissions:
  contents: read

concurrency:
  group: js-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: packages/js

jobs:
  build:
    name: Lint, typecheck, test, build & pack
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (biome)
        run: bunx biome check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Lint published package (publint)
        run: bunx publint

      - name: Check types (@arethetypeswrong/cli)
        run: bunx @arethetypeswrong/cli --pack .
